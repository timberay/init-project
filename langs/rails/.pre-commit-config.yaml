# Single source of truth for fast quality checks at git commit time.
# Tests run in CI (see .github/workflows/ci.yml). Refresh hook versions with:
#   pre-commit autoupdate

# Rails encrypted credentials (config/credentials*.yml.enc) are binary blobs
# generated by Rails; whitespace / EOL / formatting hooks would corrupt them
# and have no meaningful work to do. See ADR-0002.
exclude: '\.enc$'

repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-json
      - id: check-added-large-files
        args: ['--maxkb=1024']
      - id: mixed-line-ending
        args: ['--fix=lf']
      - id: detect-private-key
      - id: detect-aws-credentials
        args: ['--allow-missing-credentials']

  - repo: local
    hooks:
      # Gated on `bundle list rubocop` so the hook is a no-op when rubocop is
      # not in the project's bundle. See docs/decisions/ADR-0002.
      - id: rubocop
        name: rubocop
        entry: bash -c 'bundle list rubocop >/dev/null 2>&1 && bundle exec rubocop "$@" || exit 0' --
        language: system
        files: \.rb$
