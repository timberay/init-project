name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          bundler-cache: true

      - name: Install pre-commit
        run: pipx install pre-commit

      - name: Run pre-commit
        run: pre-commit run --all-files

      - name: Run tests
        run: bin/rails test
